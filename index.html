<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWBY CYOA</title>
<style>
  /* ============================================================
     RWBY CYOA - Standalone GitHub-Pages Viewer
     - Sharp rectangles everywhere (no border-radius)
     - All text centered
     - No external dependencies (no CDN, no frameworks)
     - Loads project.json via fetch
     ============================================================ */

  :root {
    --bg: #1a1a1a;
    --card-bg: #2a2a2a;
    --card-border: #444;
    --card-selected: #f5e942;
    --text: #f5f5f5;
    --text-muted: #aaa;
    --accent: #d32f2f;
    --row-header-bg: #3a1a1a;
  }

  * {
    box-sizing: border-box !important;
    border-radius: 0 !important;
    -webkit-border-radius: 0 !important;
    -moz-border-radius: 0 !important;
    text-shadow: none !important;
    -webkit-text-shadow: none !important;
  }

  html, body {
    margin: 0 !important;
    padding: 0 !important;
    background: var(--bg);
    color: var(--text);
    font-family: "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    line-height: 1.5;
    overflow-x: hidden;
    max-width: 100vw;
  }

  /* Center ALL text everywhere by default */
  body, p, span, div, h1, h2, h3, h4, h5, h6, label, button, a, li, td, th {
    text-align: center !important;
  }

  /* Header bar */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #000;
    color: #fff;
    padding: 10px 16px;
    border-bottom: 2px solid var(--accent);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .top-bar .title {
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .top-bar .score-pill {
    background: var(--accent);
    color: #fff;
    padding: 4px 12px;
    font-weight: bold;
    font-size: 14px;
    border: 2px solid #fff;
  }
  .top-bar button {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .top-bar button:hover {
    background: #555;
  }

  /* Main container */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 12px 80px;
  }

  /* Row (section) */
  .cyoa-row {
    margin: 30px 0;
    padding: 0;
  }

  .row-title {
    background: var(--row-header-bg);
    color: #fff;
    padding: 12px 16px;
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-left: 6px solid var(--accent);
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: normal;
  }
  .row-title p { margin: 0; }

  .row-text {
    background: #222;
    color: var(--text);
    padding: 10px 14px;
    margin: 0 0 16px;
    font-size: 14px;
    word-wrap: break-word;
    overflow-wrap: break-word;
    border-left: 3px solid #555;
  }
  .row-text p { margin: 6px 0; }

  /* Grid for objects - responsive */
  .row-grid {
    display: grid;
    gap: 12px;
    width: 100%;
    justify-content: center;
  }
  /* Default: 4 per row (col-md-3) */
  .row-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  /* col-md-4 → 3 per row */
  .row-grid.w-col-md-4 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  /* col-sm-5 → roughly 5 per row on wider screens */
  .row-grid.w-col-sm-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
  /* col-sm-6 → 2 per row */
  .row-grid.w-col-sm-6 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  /* w-20 → 5 per row */
  .row-grid.w-w-20     { grid-template-columns: repeat(5, minmax(0, 1fr)); }

  /* Tablet */
  @media (max-width: 992px) {
    .row-grid,
    .row-grid.w-col-md-3,
    .row-grid.w-col-md-4,
    .row-grid.w-col-sm-5,
    .row-grid.w-w-20 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .row-grid.w-col-sm-6 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  /* Mobile */
  @media (max-width: 600px) {
    .row-grid,
    .row-grid.w-col-md-3,
    .row-grid.w-col-md-4,
    .row-grid.w-col-sm-5,
    .row-grid.w-col-sm-6,
    .row-grid.w-w-20 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 400px) {
    .row-grid,
    .row-grid.w-col-md-3,
    .row-grid.w-col-md-4,
    .row-grid.w-col-sm-5,
    .row-grid.w-col-sm-6,
    .row-grid.w-w-20 { grid-template-columns: 1fr; }
  }

  /* Object card */
  .object-card {
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: default;
    transition: border-color 0.15s, background 0.15s;
    overflow: visible;
    min-height: 80px;
    position: relative;
  }
  .object-card.is-choice {
    cursor: pointer;
  }
  .object-card.is-choice:hover {
    border-color: var(--card-selected);
    background: #333;
  }
  .object-card.selected {
    border-color: var(--card-selected);
    background: #3a3a1a;
    box-shadow: 0 0 0 1px var(--card-selected) inset;
  }
  .object-card.selected::before {
    content: "✓";
    position: absolute;
    top: 4px;
    right: 6px;
    color: var(--card-selected);
    font-weight: bold;
    font-size: 16px;
    line-height: 1;
  }

  .object-image {
    width: 100%;
    margin-bottom: 8px;
  }
  .object-image img {
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid #444;
  }

  .object-title {
    font-size: 15px;
    font-weight: bold;
    margin: 4px 0;
    color: #fff;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: normal;
    text-transform: none;
    padding: 0 4px;
  }
  .object-title p { margin: 0; }

  .object-text {
    font-size: 13px;
    color: var(--text-muted);
    margin: 4px 0;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: normal;
    padding: 0 4px;
  }
  .object-text p { margin: 4px 0; }

  /* Score badge inside card */
  .score-badges {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
  }
  .score-badge {
    background: #1a1a1a;
    color: #f5e942;
    border: 1px solid #555;
    padding: 2px 6px;
    font-size: 11px;
    font-weight: bold;
    white-space: nowrap;
  }

  /* Info-only rows (no objects, just text) */
  .info-row {
    background: #222;
    border-left: 4px solid var(--accent);
    padding: 14px;
    margin: 20px 0;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  /* Loading state */
  #loading {
    text-align: center;
    padding: 80px 20px;
    font-size: 18px;
    color: var(--text-muted);
  }
  #loading.error {
    color: var(--accent);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 12px;
    border-top: 1px solid #333;
  }

  /* Hidden utility */
  .hidden { display: none !important; }

  /* Images inside HTML content */
  .object-text img,
  .row-text img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 6px auto;
  }

  /* Reset weird default behaviors */
  ul, ol { list-style-position: inside; padding-left: 0; }
  b, strong { color: #fff; }
  em, i { color: var(--text); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="title" id="top-title">RWBY CYOA</div>
  <div>
    <span class="score-pill" id="score-display">Points: 0</span>
    <button id="reset-btn" type="button">Reset</button>
  </div>
</div>

<main>
  <div id="loading">Loading project.json…</div>
  <div id="cyoa-root" class="hidden"></div>
</main>

<footer>
  Built with the standalone CYOA viewer &middot; Hosted on GitHub Pages
</footer>

<script>
/* ============================================================
   Minimal CYOA renderer
   - Reads project.json (ICC v2.x format)
   - Renders rows + objects
   - Supports click-to-select on choices
   - Tracks simple numeric scores
   ============================================================ */

(function () {
  "use strict";

  const state = {
    project: null,
    selected: new Set(),    // object IDs that are selected
    scores: {},             // scoreId -> { beforeText, afterText, value }
  };

  const root = document.getElementById('cyoa-root');
  const loading = document.getElementById('loading');
  const scoreDisplay = document.getElementById('score-display');
  const resetBtn = document.getElementById('reset-btn');
  const topTitle = document.getElementById('top-title');

  // ---- Helpers ---------------------------------------------------

  function stripHtml(html) {
    if (!html) return '';
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function setHtml(el, html) {
    if (html == null) html = '';
    el.innerHTML = html;
  }

  // Convert col-md-3 / col-md-4 / col-sm-5 / col-sm-6 / w-20 -> CSS class
  function widthClass(widthStr) {
    if (!widthStr) return 'w-col-md-3';
    const w = widthStr.trim();
    if (w === 'col-md-3') return 'w-col-md-3';
    if (w === 'col-md-4') return 'w-col-md-4';
    if (w === 'col-sm-5') return 'w-col-sm-5';
    if (w === 'col-sm-6') return 'w-col-sm-6';
    if (w === 'w-20') return 'w-w-20';
    // fallback
    return 'w-col-md-3';
  }

  // Determine if a row's objects are "choices" (clickable) or just info
  // In ICC, objects are typically choices unless they are pure info.
  // We treat any object with an `id` that doesn't start with `unlock` as a choice.
  // Row 0 contains "unlock" navigation cards - we render them as info.
  function isChoiceObject(obj, rowIndex) {
    if (rowIndex === 0) return false; // navigation row
    if (!obj.id) return false;
    return true;
  }

  // ---- Rendering -------------------------------------------------

  function renderProject(project) {
    state.project = project;
    root.innerHTML = '';

    // Set page title
    const firstRow = project.rows && project.rows[0];
    if (firstRow && firstRow.title) {
      topTitle.textContent = stripHtml(firstRow.title) || 'CYOA';
      document.title = topTitle.textContent;
    }

    project.rows.forEach((row, idx) => renderRow(row, idx, root));

    loading.classList.add('hidden');
    root.classList.remove('hidden');
    updateScoreDisplay();
  }

  function renderRow(row, idx, container) {
    const rowEl = document.createElement('section');
    rowEl.className = 'cyoa-row';
    rowEl.dataset.rowIndex = idx;

    // Row title
    if (row.title) {
      const titleEl = document.createElement('div');
      titleEl.className = 'row-title';
      setHtml(titleEl, row.title);
      rowEl.appendChild(titleEl);
    }

    // Row text (description / intro)
    if (row.titleText) {
      const textEl = document.createElement('div');
      textEl.className = 'row-text';
      setHtml(textEl, row.titleText);
      rowEl.appendChild(textEl);
    }

    // Objects grid
    const objects = row.objects || [];
    if (objects.length > 0) {
      const grid = document.createElement('div');
      grid.className = 'row-grid ' + widthClass(row.objectWidth);

      objects.forEach(obj => renderObject(obj, idx, grid));

      rowEl.appendChild(grid);
    } else if (row.titleText) {
      // Already rendered as row-text; do nothing extra
    } else {
      // empty row with no objects and no text - skip
    }

    container.appendChild(rowEl);
  }

  function renderObject(obj, rowIndex, container) {
    const card = document.createElement('div');
    card.className = 'object-card';
    card.dataset.objId = obj.id || '';

    const isChoice = isChoiceObject(obj, rowIndex);
    if (isChoice) card.classList.add('is-choice');

    // Image
    if (obj.image) {
      const imgWrap = document.createElement('div');
      imgWrap.className = 'object-image';
      const img = document.createElement('img');
      img.src = obj.image;
      img.alt = stripHtml(obj.title) || '';
      img.loading = 'lazy';
      imgWrap.appendChild(img);
      card.appendChild(imgWrap);
    }

    // Title
    if (obj.title) {
      const titleEl = document.createElement('div');
      titleEl.className = 'object-title';
      setHtml(titleEl, obj.title);
      card.appendChild(titleEl);
    }

    // Text
    if (obj.text) {
      const textEl = document.createElement('div');
      textEl.className = 'object-text';
      setHtml(textEl, obj.text);
      card.appendChild(textEl);
    }

    // Score badges
    if (Array.isArray(obj.scores) && obj.scores.length > 0) {
      const badges = document.createElement('div');
      badges.className = 'score-badges';
      obj.scores.forEach(sc => {
        const b = document.createElement('span');
        b.className = 'score-badge';
        const before = sc.beforeText || '';
        const after = sc.afterText || '';
        const val = sc.value != null ? sc.value : 0;
        b.textContent = `${before} ${val} ${after}`.trim();
        b.dataset.scoreId = sc.id || '';
        b.dataset.scoreValue = val;
        badges.appendChild(b);
      });
      card.appendChild(badges);
    }

    // Click to toggle selection
    if (isChoice) {
      card.addEventListener('click', () => toggleSelect(obj, card));
    }

    container.appendChild(card);
  }

  // ---- Selection / scores ---------------------------------------

  function toggleSelect(obj, card) {
    const id = obj.id;
    if (!id) return;
    if (state.selected.has(id)) {
      state.selected.delete(id);
      card.classList.remove('selected');
      // Subtract this object's scores
      (obj.scores || []).forEach(sc => {
        if (!state.scores[sc.id]) return;
        state.scores[sc.id].value -= (sc.value || 0);
      });
    } else {
      state.selected.add(id);
      card.classList.add('selected');
      // Add this object's scores
      (obj.scores || []).forEach(sc => {
        if (!state.scores[sc.id]) {
          state.scores[sc.id] = {
            beforeText: sc.beforeText || '',
            afterText: sc.afterText || '',
            value: 0,
          };
        }
        state.scores[sc.id].value += (sc.value || 0);
        state.scores[sc.id].beforeText = sc.beforeText || state.scores[sc.id].beforeText;
        state.scores[sc.id].afterText = sc.afterText || state.scores[sc.id].afterText;
      });
    }
    updateScoreDisplay();
  }

  function updateScoreDisplay() {
    // Sum all numeric scores into a single "Points" counter,
    // then list each score breakdown in title attribute.
    let total = 0;
    const parts = [];
    Object.keys(state.scores).forEach(sid => {
      const s = state.scores[sid];
      total += s.value;
      parts.push(`${s.beforeText} ${s.value} ${s.afterText}`.trim());
    });
    scoreDisplay.textContent = `Points: ${total}`;
    if (parts.length) {
      scoreDisplay.title = parts.join('\n');
    } else {
      scoreDisplay.title = '';
    }
  }

  function resetAll() {
    if (!confirm('Clear all selections?')) return;
    state.selected.clear();
    state.scores = {};
    document.querySelectorAll('.object-card.selected').forEach(el => el.classList.remove('selected'));
    updateScoreDisplay();
  }

  resetBtn.addEventListener('click', resetAll);

  // ---- Load project.json ----------------------------------------

  function loadProject() {
    // Try a few common locations
    const candidates = [
      'project.json',
      './project.json',
    ];
    let idx = 0;
    function tryNext() {
      if (idx >= candidates.length) {
        loading.classList.add('error');
        loading.textContent = 'Could not load project.json. Make sure it is in the same folder as index.html.';
        return;
      }
      const url = candidates[idx++];
      fetch(url, { cache: 'no-store' })
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(data => {
          renderProject(data);
          // Inject any customCSS from project (in case user wants extra overrides)
          if (data.customCSS) {
            const styleEl = document.createElement('style');
            styleEl.textContent = data.customCSS;
            document.head.appendChild(styleEl);
          }
        })
        .catch(err => {
          console.warn('Fetch failed for', url, err);
          tryNext();
        });
    }
    tryNext();
  }

  // Kick off
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadProject);
  } else {
    loadProject();
  }
})();
</script>
</body>
</html>
